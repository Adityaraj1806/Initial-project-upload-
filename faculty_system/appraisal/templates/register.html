<h1>Register</h1>
<form method="POST">
    {% csrf_token %}
    Username: <input type="text" name="username"><br>
    Password: <input type="password" name="password"><br>
    <button type="submit">Register</button>
</form>
{% if error %}<p style="color:red">{{ error }}</p>{% endif %}
<a href="{% url 'login' %}">Login</a>
