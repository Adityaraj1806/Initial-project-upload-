<!DOCTYPE html>
<html>
<head>
    <title>Faculty Appraisal System</title>
</head>
<body>
    <h1>Welcome to Faculty Appraisal System</h1>
    <h2>Faculty List</h2>
    <ul>
        {% for faculty in faculties %}
            <li>{{ faculty.user.get_full_name }} - {{ faculty.department }}</li>
        {% empty %}
            <li>No faculty found.</li>
        {% endfor %}
    </ul>
    <a href="{% url 'login' %}">Login</a> | <a href="{% url 'register' %}">Register</a>
</body>
</html>
